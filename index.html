<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obtine CID | Wow-Soft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --accent-color: #3b82f6;
        --accent-hover: #2563eb;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
        --success: #22c55e;
        --error: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        background-image: 
          radial-gradient(at 0% 0%, rgba(30, 41, 59, 1) 0, transparent 50%),
          radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
          radial-gradient(at 50% 100%, rgba(15, 23, 42, 1) 0, transparent 50%);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        line-height: 1.5;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 540px;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      header {
        text-align: center;
        margin-bottom: 40px;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        margin-bottom: 12px;
        background: linear-gradient(to right, #f8fafc, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 1.1rem;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .input-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      input[type="text"] {
        width: 100%;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 16px;
        color: var(--text-primary);
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.2s;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      }

      button {
        width: 100%;
        background: var(--accent-color);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .result-container {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid var(--border-color);
        display: none;
      }

      .result-container.active {
        display: block;
        animation: slideDown 0.3s ease-out;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .result-label {
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 12px;
        color: var(--text-secondary);
      }

      .result-box {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 16px;
        font-family: monospace;
        font-size: 1.1rem;
        word-break: break-all;
        text-align: center;
        letter-spacing: 0.05em;
      }

      .status-message {
        margin-top: 16px;
        font-size: 0.875rem;
        text-align: center;
      }

      .status-message.success { color: var(--success); }
      .status-message.error { color: var(--error); }

      footer {
        margin-top: auto;
        padding-top: 40px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 640px) {
        h1 { font-size: 2rem; }
        .card { padding: 24px; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Obtine CID</h1>
        <p class="subtitle">Introdu IID-ul pentru a obtine codul de confirmare.</p>
      </header>

      <div class="card">
        <div class="input-group">
          <label for="iid-input">ID Instalare (IID)</label>
          <input 
            id="iid-input" 
            type="text" 
            placeholder="Ex: 123456-123456-..." 
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <button id="iid-button">
          <span class="spinner" id="btn-spinner"></span>
          <span id="btn-text">Obtine CID</span>
        </button>

        <div id="status-msg" class="status-message"></div>

        <div id="result-container" class="result-container">
          <p class="result-label">Cod de Confirmare (CID):</p>
          <div id="iid-result" class="result-box"></div>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Wow-Soft. Toate drepturile rezervate.</p>
    </footer>

    <script>
      const iidInput = document.getElementById("iid-input");
      const iidButton = document.getElementById("iid-button");
      const iidResult = document.getElementById("iid-result");
      const resultContainer = document.getElementById("result-container");
      const statusMsg = document.getElementById("status-msg");
      const btnSpinner = document.getElementById("btn-spinner");
      const btnText = document.getElementById("btn-text");

      function setStatus(text, type) {
        statusMsg.textContent = text;
        statusMsg.className = "status-message " + (type || "");
      }

      function showResult(cid) {
        iidResult.textContent = cid;
        resultContainer.classList.add("active");
        setStatus("CID generat cu succes!", "success");
      }

      function hideResult() {
        resultContainer.classList.remove("active");
        setStatus("", "");
      }

      function setLoading(isLoading) {
        iidButton.disabled = isLoading;
        btnSpinner.style.display = isLoading ? "block" : "none";
        btnText.textContent = isLoading ? "Se generează..." : "Obtine CID";
        if (isLoading) hideResult();
      }

      function isIidFormatValid(iid) {
        const normalized = iid.replace(/[-\s]/g, "");
        return /^\d+$/.test(normalized) && normalized.length >= 30;
      }

      async function handleIid() {
        const iid = iidInput.value.trim();
        
        if (!iid) {
          setStatus("Introdu un IID valid.", "error");
          return;
        }

        if (!isIidFormatValid(iid)) {
          setStatus("IID invalid. Verifică cifrele introduse.", "error");
          return;
        }

        setLoading(true);

        try {
          const response = await fetch("/.netlify/functions/get-cid-iid", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ iid }),
          });
          
          if (!response.ok) {
            throw new Error("Eroare la server. Reîncearcă mai târziu.");
          }

          const data = await response.json();

          if (data.error) {
            throw new Error(data.error);
          }

          if (!data.cid) {
            throw new Error("Nu s-a putut genera CID-ul pentru acest IID.");
          }

          showResult(data.cid);
        } catch (error) {
          setStatus(error.message || "A apărut o eroare neașteptată.", "error");
        } finally {
          setLoading(false);
        }
      }

      iidButton.addEventListener("click", handleIid);
      iidInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleIid();
      });

      // Simple auto-formatting for IID (optional improvement)
      iidInput.addEventListener("input", (e) => {
        if (statusMsg.textContent) setStatus("", "");
      });
    </script>
  </body>
</html>
